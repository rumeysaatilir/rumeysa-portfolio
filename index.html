<title>AI Visual Portfolio | Rümeysa Atılır</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Space Grotesk',sans-serif;
background:#f4f0e8;
color:#111;
}

header{
padding:34px 42px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #111;
}

.logo{
font-size:22px;
font-weight:700;
}

header a{
font-size:14px;
text-transform:uppercase;
border:1px solid #111;
border-radius:30px;
padding:12px 20px;
text-decoration:none;
color:#111;
transition:.3s;
}

header a:hover{
background:#111;
color:#f4f0e8;
}

.hero{
padding:90px 42px 60px;
}

.hero h1{
font-family:'Playfair Display',serif;
font-size:9vw;
line-height:.85;
letter-spacing:-5px;
}

.hero p{
font-size:22px;
max-width:760px;
line-height:1.35;
margin-top:28px;
}

.gallery{
padding:30px 42px 120px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:26px;
}

.item{
height:430px;
background:#fffaf0;
border:1px solid rgba(17,17,17,.18);
border-radius:28px;
padding:16px;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
transition:.3s;
}

.item:hover{
transform:translateY(-6px);
box-shadow:0 20px 45px rgba(0,0,0,.13);
}

.item img{
width:100%;
height:100%;
object-fit:contain;
display:block;
}

footer{
padding:30px 42px;
border-top:1px solid #111;
display:flex;
justify-content:space-between;
font-size:14px;
}

@media(max-width:800px){
header{
padding:24px 20px;
}

.hero{
padding:70px 20px 40px;
}

.hero h1{
font-size:17vw;
letter-spacing:-3px;
}

.hero p{
font-size:19px;
}

.gallery{
padding:20px 20px 80px;
grid-template-columns:1fr;
gap:22px;
}

.item{
height:420px;
}

footer{
padding:24px 20px;
display:block;
}
}
</style>
</head>

<h1>AI Visual<br>Portfolio</h1>

</p>
