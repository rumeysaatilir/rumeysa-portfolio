<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Visual Portfolio | Rümeysa Atılır</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Space Grotesk',sans-serif;
background:#f4f0e8;
color:#111;
}

a{
text-decoration:none;
color:inherit;
}

header{
position:sticky;
top:0;
background:rgba(244,240,232,.95);
backdrop-filter:blur(12px);
padding:28px 40px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #111;
z-index:999;
}

.logo{
font-size:22px;
font-weight:700;
}

.back{
padding:12px 22px;
border:1px solid #111;
border-radius:40px;
transition:.3s;
}

.back:hover{
background:#111;
color:#f4f0e8;
}

.hero{
padding:90px 40px 60px;
}

.hero h1{
font-family:'Playfair Display',serif;
font-size:8vw;
line-height:.85;
letter-spacing:-4px;
}

.hero p{
font-size:22px;
max-width:800px;
margin-top:24px;
line-height:1.5;
}

.gallery{
padding:0 40px 120px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:24px;
}

.item{
background:#fff;
border-radius:28px;
padding:15px;
height:420px;
display:flex;
align-items:center;
justify-content:center;
border:1px solid rgba(0,0,0,.08);
overflow:hidden;
transition:.35s;
}

.item:hover{
transform:translateY(-8px);
box-shadow:0 20px 45px rgba(0,0,0,.12);
}

.item img{
width:100%;
height:100%;
object-fit:contain;
display:block;
}

footer{
padding:30px 40px;
border-top:1px solid #111;
font-size:14px;
display:flex;
justify-content:space-between;
}

@media(max-width:900px){
header{
padding:20px;
}

.hero{
padding:60px 20px 40px;
}

.hero h1{
font-size:15vw;
}

.hero p{
font-size:18px;
}

.gallery{
padding:0 20px 80px;
grid-template-columns:1fr;
}

.item{
height:420px;
}

footer{
padding:20px;
display:block;
}
}
</style>
</head>

<body>

<header>
<div class="logo">Rümeysa Atılır</div>
<a href="index.html" class="back">← Home</a>
</header>

<section class="hero">
<h1>AI Visual<br>Portfolio</h1>
<p>
Artificial Intelligence supported visual design works.
Click any image to open the full-size original version.
</p>
</section>

<section class="gallery" id="gallery"></section>

<footer>
<span>© 2026 Rümeysa Atılır</span>
<span>AI Visual Portfolio</span>
</footer>

<script>
const gallery = document.getElementById("gallery");

for(let i = 1; i <= 30; i++){
const item = document.createElement("a");
item.href = `ai-visual/${i}.jpg`;
item.target = "_blank";
item.className = "item";

item.innerHTML = `
<img src="ai-visual/${i}.jpg" alt="AI Visual ${i}">
`;

gallery.appendChild(item);
}
</script>

</body>
</html>
