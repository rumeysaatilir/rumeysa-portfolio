<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Visual Gallery</title>

<style>

body{
background:#111;
padding:40px;
font-family:Arial,sans-serif;
}

h1{
color:white;
text-align:center;
margin-bottom:40px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.gallery img{
width:100%;
height:320px;
object-fit:cover;
border-radius:20px;
transition:.3s;
cursor:pointer;
}

.gallery img:hover{
transform:scale(1.03);
}

</style>
</head>
<body>

<h1>AI Visual Gallery</h1>

<div class="gallery">

</body>
</html>
