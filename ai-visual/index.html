<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Visual Portfolio | Rümeysa Atılır</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#f4f0e8;
color:#111;
font-family:Arial,sans-serif;
padding:40px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:70px;
}

.logo{
font-size:24px;
font-weight:700;
}

.home{
border:1px solid #111;
padding:12px 22px;
border-radius:40px;
text-decoration:none;
color:#111;
transition:.3s;
}

.home:hover{
background:#111;
color:#f4f0e8;
}

h1{
font-size:64px;
line-height:.95;
margin-bottom:18px;
}

p{
font-size:20px;
max-width:720px;
line-height:1.4;
margin-bottom:50px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:24px;
}

.gallery a{
background:white;
border-radius:24px;
padding:14px;
height:430px;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.08);
transition:.3s;
}

.gallery a:hover{
transform:translateY(-6px);
}

.gallery img{
width:100%;
height:100%;
object-fit:contain;
display:block;
}

@media(max-width:800px){
body{
padding:24px;
}

.header{
margin-bottom:50px;
}

h1{
font-size:42px;
}

p{
font-size:18px;
}

.gallery a{
height:380px;
}
}
</style>
</head>

<body>

<div class="header">
<div class="logo">Rümeysa Atılır</div>
